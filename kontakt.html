<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FK Sloboda Tuzla</title> 
    <link rel="icon" type="image/png" href="images/SlobodaLogo.png">
    <link rel="stylesheet" href="css/tptpstil.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
<nav class="meni">
    <div class="logo">
        <img src="Images/SlobodaLogo.png" alt="Logo FK Sloboda">
    </div>
    <div class="linkovi">
        <a href="index.html">Početna</a>
        <a href="sadrzaj.html">O Nama</a>
        <a href="kontakt.html">Kontakt</a>
    </div>
    <div class="github-desno">    <!-- odvajanje githuba desno -->
        <a href="https://github.com/adnansehanovic/Gupa4-TPTP-2026 " target="_blank">GitHub</a>
    </div>
</nav>

<div class="sadrzaj2-kontejner">

    <nav class="lijevi-meni">
        <h3>Pratite nas</h3>
        <p>Budite u toku sa informacijama:</p>
        <div class="kontakt-drustvene">
            <a href="https://facebook.com/fksloboda" target="_blank" class="filter-btn">Facebook</a>
            <a href="https://instagram.com/fksloboda" target="_blank" class="filter-btn">Instagram</a>
            <a href="https://youtube.com" target="_blank" class="filter-btn">YouTube</a>
        </div>
    </nav>

    <main class="glavni-sadrzaj">
    <div class="kontakt-kontejner">
    <h2>Kontaktirajte nas</h2>
    
    <div id="uspjehPoruka" class="skriveno"></div>

    <!--Gemini je pomogao
    novalidate onemogucava defaultnu validaciju browsera,
    jer cemo mi to raditi custom putem JavaScripta -->
    <form id="kontaktForma" novalidate> 
        
        <!--Gemini je pomogao
        label govori sta da unosi, for="ime" spaja labelu sa css inputom
        input pravi polje za unos teksta
        name="ime" sacuva vrijednost inputa kao ime = nesto
        span je prazan i aktivira kada je netacan unos -->
        <div class="forma-grupa">
            <label for="ime">Ime:</label>
            <input type="text" id="ime" name="ime">
            <span class="greska-tekst" id="imeGreska"></span>
        </div>

        <div class="forma-grupa">
            <label for="prezime">Prezime:</label>
            <input type="text" id="prezime" name="prezime">
            <span class="greska-tekst" id="prezimeGreska"></span>
        </div>
        

        <div class="forma-grupa">
            <label for="email">E-mail adresa:</label>
            <input type="text" id="email" name="email">
            <span class="greska-tekst" id="emailGreska"></span>
        </div>


        <div class="forma-grupa">
            <label for="telefon">Broj telefona:</label>
            <input type="text" id="telefon" name="telefon">
            <span class="greska-tekst" id="telefonGreska"></span>
        </div>

        <!--Gemini je pomogao
        Ovo je "drop-down menu" gdje se listaju opcije sa <option>
        Value predstavlja vrijednost koja se šalje na server -->
        <div class="forma-grupa">
            <label for="tema">Tema upita:</label>
            <select id="tema" name="tema">
                <option value="">-- Odaberite temu --</option>
                <option value="ulaznice">Ulaznice i članstvo</option>
                <option value="sponzorstvo">Sponzorstvo</option>
                <option value="novinari">Press i novinari</option>
                <option value="ostalo">Ostalo</option>
            </select>
            <span class="greska-tekst" id="temaGreska"></span>
        </div>
        
        <!--Gemini je pomogao
        textarea je polje za unos više redava teksta -->
        <div class="forma-grupa">
            <label for="poruka">Vaša poruka:</label>
            <textarea id="poruka" name="poruka" rows="5"></textarea>
            <span class="greska-tekst" id="porukaGreska"></span>
        </div>

        <!--Gemini je pomogao
        Ovdje se nalaze 2 dugmeta sa potvrdu ili resetovanje forme -->
        <div class="forma-akcije">
            <button type="submit" id="submitDugme">Pošalji poruku</button>
            <button type="button" id="resetDugme">Resetuj formu</button>
        </div>
    </form>
</div>
</main>

<aside class="desni-aside">
        <h3>Naša lokacija</h3>
        <p>Stadion Tušanj, Tuzla</p>
        <iframe
            class="mapa-okvir"
            src="https://maps.google.com/maps?q=Rudarska%20stadion%20Tu%C5%A1anj%20bb%2075000%20Tuzla%2C%20Bosnia%20and%20Herzegovina&t=m&z=15&output=embed&iwloc=near"
            allowfullscreen=""
            loading="lazy">
        </iframe>
    </aside>
</div>
    
<footer class="glavni-footer"> <!-- css footera -->
    <p> Adnan Šehanović, Adis Trnačević, Adna Kunosić - 2026 </p>
    <div class="drustvene-mreze">
        <a href="https://facebook.com/fksloboda">Facebook</a> | 
        <a href="https://instagram.com/fksloboda">Instagram</a>
    </div>
</footer>

<button id="mod-dugme" class="plivajuce-dugme">🌙</button>
<script src="js/tptpskripte.js"></script>

</body>
</html>
